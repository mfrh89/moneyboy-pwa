server {
    listen 80;

    # Der Pfad, in den wir die 'dist'-Dateien im Dockerfile kopiert haben
    root /usr/share/nginx/html;
    index index.html;

    # Service workers: never cache — must always be fetched fresh
    location ~* (firebase-messaging-sw\.js|sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Hashed assets: cache forever (content-addressed)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Everything else (index.html, manifest, icons): no-cache
    location / {
        add_header Cache-Control "no-cache";
        # Wichtig für Single-Page-Anwendungen
        try_files $uri $uri/ /index.html;
    }
}
