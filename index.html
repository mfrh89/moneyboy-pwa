<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f9f9f9" id="theme-color-meta" />
    <title>Moneyboy - Monthly Budget Management</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Moneyboy" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png" />

    <!-- Additional PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- JetBrains Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        plugins: [
          function({ addVariant }) {
            addVariant('can-hover', '@media (hover: hover)');
          }
        ],
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            borderRadius: {
              'ds-xs': '4px',
              'ds-sm': '8px',
              'ds-md': '12px',
              'ds-lg': '16px',
              'ds-xl': '24px',
              'ds-2xl': '32px',
            },
            colors: {
              surface: {
                DEFAULT: 'var(--surface)',
                low: 'var(--surface-low)',
                mid: 'var(--surface-mid)',
                high: 'rgb(var(--surface-high-rgb) / <alpha-value>)',
                highest: 'var(--surface-highest)',
                lowest: 'var(--surface-lowest)',
              },
              primary: 'rgb(var(--primary-rgb) / <alpha-value>)',
              'primary-container': 'var(--primary-container)',
              'on-primary': 'rgb(var(--on-primary-rgb) / <alpha-value>)',
              'on-surface': 'rgb(var(--on-surface-rgb) / <alpha-value>)',
              'on-surface-variant': 'rgb(var(--on-surface-variant-rgb) / <alpha-value>)',
              'outline-variant': 'rgb(var(--outline-variant-rgb) / <alpha-value>)',
              secondary: 'var(--secondary)',
              tertiary: 'var(--tertiary)',
              'status-success': 'var(--status-success)',
              'status-error': 'var(--status-error)',
              'status-warning': 'var(--status-warning)',
              'status-info': 'var(--status-info)',
              'accent-orange': 'var(--accent-orange)',
              'accent-magenta': 'var(--accent-magenta)',
            }
          }
        }
      }
    </script>
    <style>
      /* Technical Alchemist Design System */
      :root {
        color-scheme: light dark;

        /* Surface tokens */
        --surface: #f9f9f9;
        --surface-low: #f3f3f3;
        --surface-mid: #eeeeee;
        --surface-high: #e8e8e8;
        --surface-high-rgb: 232 232 232;
        --surface-highest: #e2e2e2;
        --surface-lowest: #ffffff;

        /* Primary tokens */
        --primary: #141414;
        --primary-rgb: 20 20 20;
        --primary-container: #3b3b3b;
        --on-primary: #ffffff;
        --on-primary-rgb: 255 255 255;

        /* Text tokens */
        --on-surface: #1a1a1a;
        --on-surface-rgb: 26 26 26;
        --on-surface-variant: #474747;
        --on-surface-variant-rgb: 71 71 71;

        /* Border tokens */
        --outline-variant: #c4c4c4;
        --outline-variant-rgb: 196 196 196;

        /* Brand tokens */
        --secondary: #466270;
        --tertiary: #273f49;

        /* Status & accent tokens */
        --status-success: #3d6652;
        --status-error: #7a3535;
        --status-warning: #7a6030;
        --status-info: #2d4f6b;
        --accent-orange: #7a4a30;
        --accent-magenta: #6b3558;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Surface tokens */
          --surface: #111111;
          --surface-low: #1a1a1a;
          --surface-mid: #222222;
          --surface-high: #2a2a2a;
          --surface-high-rgb: 42 42 42;
          --surface-highest: #323232;
          --surface-lowest: #1c1c1c;

          /* Primary tokens */
          --primary: #f0f0f0;
          --primary-rgb: 240 240 240;
          --primary-container: #cccccc;
          --on-primary: #141414;
          --on-primary-rgb: 20 20 20;

          /* Text tokens */
          --on-surface: #efefef;
          --on-surface-rgb: 239 239 239;
          --on-surface-variant: #8a8a8a;
          --on-surface-variant-rgb: 138 138 138;

          /* Border tokens */
          --outline-variant: #3a3a3a;
          --outline-variant-rgb: 58 58 58;

          /* Brand tokens */
          --secondary: #6a8a9a;
          --tertiary: #3d6070;

          /* Status & accent tokens */
          --status-success: #4d8068;
          --status-error: #a04545;
          --status-warning: #9a7a40;
          --status-info: #3d6585;
          --accent-orange: #9a6040;
          --accent-magenta: #8a4570;
        }
      }

      * {
        font-family: 'JetBrains Mono', monospace;
      }

      html {
        /* Safe areas + overscroll bleed = glass nav/header equivalent */
        background-color: #fdfdfd;
      }

      @media (prefers-color-scheme: dark) {
        html {
          background-color: #141414;
        }
      }

      body {
        background-color: var(--surface);
        color: var(--on-surface-variant);
        -webkit-tap-highlight-color: transparent;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Safe area utilities for iOS */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      /* Custom Date Input Styling */
      input[type="date"] {
        position: relative;
        color-scheme: light dark;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      input[type="date"]::-webkit-datetime-edit-text,
      input[type="date"]::-webkit-datetime-edit-month-field,
      input[type="date"]::-webkit-datetime-edit-day-field,
      input[type="date"]::-webkit-datetime-edit-year-field {
        color: var(--on-surface);
        padding: 0 2px;
      }

      input[type="date"]:focus::-webkit-datetime-edit-text,
      input[type="date"]:focus::-webkit-datetime-edit-month-field,
      input[type="date"]:focus::-webkit-datetime-edit-day-field,
      input[type="date"]:focus::-webkit-datetime-edit-year-field {
        color: var(--primary);
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      @media (prefers-color-scheme: dark) {
        .glass {
          background: rgba(20, 20, 20, 0.85);
        }
      }

      /* Float shadow */
      .shadow-float {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
      }

      @media (prefers-color-scheme: dark) {
        .shadow-float {
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }
      }

      /* Header safe-area padding for iOS (inset + 12px base padding) */
      .pt-header-safe {
        padding-top: calc(env(safe-area-inset-top) + 12px);
      }
    </style>
  <script>
    // iOS PWA ignores media attribute on theme-color — update dynamically instead
    (function () {
      var meta = document.getElementById('theme-color-meta');
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      function update() { meta.setAttribute('content', mq.matches ? '#111111' : '#f9f9f9'); }
      mq.addEventListener('change', update);
      update();
    })();
  </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
