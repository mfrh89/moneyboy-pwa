    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Catppuccin Mocha Theme Variables */
      :root {
        --ctp-rosewater: #f5e0dc;
        --ctp-flamingo: #f2cdcd;
        --ctp-pink: #f5c2e7;
        --ctp-mauve: #cba6f7;
        --ctp-red: #f38ba8;
        --ctp-maroon: #eba0ac;
        --ctp-peach: #fab387;
        --ctp-yellow: #f9e2af;
        --ctp-green: #a6e3a1;
        --ctp-teal: #94e2d5;
        --ctp-sky: #89dceb;
        --ctp-sapphire: #74c7ec;
        --ctp-blue: #89b4fa;
        --ctp-lavender: #b4befe;
        --ctp-text: #cdd6f4;
        --ctp-subtext1: #bac2de;
        --ctp-subtext0: #a6adc8;
        --ctp-overlay2: #9399b2;
        --ctp-overlay1: #7f849c;
        --ctp-overlay0: #6c7086;
        --ctp-surface2: #585b70;
        --ctp-surface1: #45475a;
        --ctp-surface0: #313244;
        --ctp-base: #1e1e2e;
        --ctp-mantle: #181825;
        --ctp-crust: #11111b;
      }

      body {
        background-color: var(--ctp-base);
        color: var(--ctp-text);
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      /* Safe area utilities for iOS */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      /* Custom Date Input Styling */
      input[type="date"] {
        position: relative;
        color-scheme: dark;
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.8) sepia(0.2) saturate(2) hue-rotate(220deg);
        opacity: 0.8;
        transition: opacity 0.2s;
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
        filter: invert(0.9) sepia(0.3) saturate(2.5) hue-rotate(220deg);
      }
      
      input[type="date"]::-webkit-datetime-edit-text,
      input[type="date"]::-webkit-datetime-edit-month-field,
      input[type="date"]::-webkit-datetime-edit-day-field,
      input[type="date"]::-webkit-datetime-edit-year-field {
        color: var(--ctp-text);
        padding: 0 2px;
      }
      
      input[type="date"]:focus::-webkit-datetime-edit-text,
      input[type="date"]:focus::-webkit-datetime-edit-month-field,
      input[type="date"]:focus::-webkit-datetime-edit-day-field,
      input[type="date"]:focus::-webkit-datetime-edit-year-field {
        color: var(--ctp-mauve);
      }
      
      /* Firefox date input */
      input[type="date"]::-moz-calendar-picker-indicator {
        filter: invert(0.8) sepia(0.2) saturate(2) hue-rotate(220deg);
      }
    </style>

    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",

}
</script>
</head>
