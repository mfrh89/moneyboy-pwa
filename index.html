    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Moneyboy" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Additional PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- JetBrains Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        plugins: [
          function({ addVariant }) {
            addVariant('can-hover', '@media (hover: hover)');
          }
        ],
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            borderRadius: {
              'ds-xs': '4px',
              'ds-sm': '8px',
              'ds-md': '12px',
              'ds-lg': '16px',
              'ds-xl': '24px',
              'ds-2xl': '32px',
            },
            colors: {
              surface: {
                DEFAULT: '#f9f9f9',
                low: '#f3f3f3',
                mid: '#eeeeee',
                high: '#e8e8e8',
                highest: '#e2e2e2',
                lowest: '#ffffff',
              },
              primary: '#000000',
              'primary-container': '#3b3b3b',
              'on-primary': '#ffffff',
              'on-surface': '#1a1a1a',
              'on-surface-variant': '#474747',
              'outline-variant': '#c4c4c4',
              secondary: '#466270',
              tertiary: '#273f49',
              'status-success': '#3d6652',
              'status-error': '#7a3535',
              'status-warning': '#7a6030',
              'status-info': '#2d4f6b',
              'accent-orange': '#7a4a30',
              'accent-magenta': '#6b3558',
            }
          }
        }
      }
    </script>
    <style>
      /* Technical Alchemist Design System */
      :root {
        --surface: #f9f9f9;
        --surface-low: #f3f3f3;
        --surface-mid: #eeeeee;
        --surface-high: #e8e8e8;
        --surface-highest: #e2e2e2;
        --surface-lowest: #ffffff;
        --primary: #000000;
        --primary-container: #3b3b3b;
        --on-primary: #ffffff;
        --on-surface: #1a1a1a;
        --on-surface-variant: #474747;
        --outline-variant: #c4c4c4;
        --secondary: #466270;
        --tertiary: #273f49;
        --status-success: #3d6652;
        --status-error: #7a3535;
        --status-warning: #7a6030;
        --status-info: #2d4f6b;
        --accent-orange: #7a4a30;
        --accent-magenta: #6b3558;
      }

      * {
        font-family: 'JetBrains Mono', monospace;
      }

      body {
        background-color: var(--surface);
        color: var(--on-surface-variant);
        -webkit-tap-highlight-color: transparent;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Safe area utilities for iOS */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      /* Custom Date Input Styling */
      input[type="date"] {
        position: relative;
        color-scheme: light;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      input[type="date"]::-webkit-datetime-edit-text,
      input[type="date"]::-webkit-datetime-edit-month-field,
      input[type="date"]::-webkit-datetime-edit-day-field,
      input[type="date"]::-webkit-datetime-edit-year-field {
        color: var(--on-surface);
        padding: 0 2px;
      }

      input[type="date"]:focus::-webkit-datetime-edit-text,
      input[type="date"]:focus::-webkit-datetime-edit-month-field,
      input[type="date"]:focus::-webkit-datetime-edit-day-field,
      input[type="date"]:focus::-webkit-datetime-edit-year-field {
        color: var(--primary);
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      /* Float shadow */
      .shadow-float {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
      }

      /* Header safe-area padding for iOS (inset + 12px base padding) */
      .pt-header-safe {
        padding-top: calc(env(safe-area-inset-top) + 12px);
      }
    </style>

{

    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
